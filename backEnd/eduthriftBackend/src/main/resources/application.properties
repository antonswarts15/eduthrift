spring.application.name=eduthrift

# Database Configuration
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/eduthrift}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:password}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

spring.flyway.enabled=true
spring.flyway.locations=classpath:database/migrations
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1

# Server Configuration
server.port=8080

# JWT Configuration
jwt.secret=${JWT_SECRET:eduthrift-super-secret-key-that-is-at-least-256-bits-long-for-security}
jwt.expiration=86400000

app.base.url=${APP_BASE_URL:http://localhost:3000}

# ─── Startup seed data ───────────────────────────────────────────────────────
# ADMIN_INITIAL_PASSWORD and CREATE_TEST_DATA are read directly from env vars
# via @Value in DataInitializer.java — do NOT re-declare them here.
# Re-declaring them with self-referential placeholders causes a circular
# reference error in Spring Framework 6.2+ (Spring Boot 3.3+).

# TradeSafe Configuration (kept for reference — not active)
tradesafe.client.id=${TRADESAFE_CLIENT_ID:}
tradesafe.client.secret=${TRADESAFE_CLIENT_SECRET:}
tradesafe.api.url=${TRADESAFE_API_URL:https://api.tradesafe.co.za}
tradesafe.auth.url=${TRADESAFE_AUTH_URL:https://auth.tradesafe.co.za}
tradesafe.cf.client.id=${TRADESAFE_CF_CLIENT_ID:}
tradesafe.cf.client.secret=${TRADESAFE_CF_CLIENT_SECRET:}

# ─── Payment provider abstraction layer ──────────────────────────────────────
# Default provider used when an order has no explicit payment method set.
# Must match an Order.PaymentMethod enum constant (PAYSTACK, OZOW, PEACH, STITCH).
payment.default-provider=PAYSTACK

# Per-provider feature flags.
# Paystack and Ozow are always-on (no @ConditionalOnProperty guard on their beans).
# Peach and Stitch are stubs — set to true only once the integration is complete.
payment.providers.paystack.enabled=true
payment.providers.ozow.enabled=true
payment.providers.peach.enabled=false
payment.providers.stitch.enabled=false

# Paystack Configuration
# Test keys:  sk_test_xxx / pk_test_xxx  (dashboard.paystack.com)
# Live keys:  sk_live_xxx / pk_live_xxx
paystack.secret.key=${PAYSTACK_SECRET_KEY:sk_test_placeholder}
paystack.public.key=${PAYSTACK_PUBLIC_KEY:pk_test_placeholder}

# Ozow Configuration
# Obtain from merchant.ozow.com → Settings → Site
ozow.site.code=${OZOW_SITE_CODE:}
ozow.private.key=${OZOW_PRIVATE_KEY:}
ozow.is.test=${OZOW_IS_TEST:false}

# Peach Payments Configuration (populate when integrating)
# Obtain from peachpayments.com → Settings → Credentials
peach.entity.id=${PEACH_ENTITY_ID:}
peach.access.token=${PEACH_ACCESS_TOKEN:}
peach.webhook.secret=${PEACH_WEBHOOK_SECRET:}

# Stitch Configuration (populate when integrating)
# Obtain from stitch.money → Developer Portal
stitch.client.id=${STITCH_CLIENT_ID:}
stitch.client.secret=${STITCH_CLIENT_SECRET:}
stitch.webhook.secret=${STITCH_WEBHOOK_SECRET:}

# Internal API base URL (used for webhook notify URLs sent to payment providers)
api.base.url=${API_BASE_URL:https://api.eduthrift.co.za}

# Pudo Webhook Configuration
# Set this to a long random secret and register the same value in the Pudo developer portal
pudo.webhook.secret=${PUDO_WEBHOOK_SECRET:}

# ShipLogic (TCG/CourierGuy) Webhook Configuration
# Set this to a long random secret and register the same value in the ShipLogic developer portal
shiplogic.webhook.secret=${SHIPLOGIC_WEBHOOK_SECRET:}

# File Upload Configuration
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
file.upload.dir=${FILE_UPLOAD_DIR:/app/uploads}

# Firebase Cloud Messaging (FCM) — service account key JSON, base64-encoded or raw JSON string
firebase.service-account-json=${FIREBASE_SERVICE_ACCOUNT_JSON:}

# Email (SMTP) Configuration — Zoho Mail Pro
spring.mail.host=${MAIL_HOST:smtppro.zoho.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:support@eduthrift.co.za}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000
# Admin email for internal alerts (payout failures, manual payouts)
mail.admin.email=${MAIL_ADMIN_EMAIL:support@eduthrift.co.za}

# Response compression
server.compression.enabled=true
server.compression.mime-types=application/json,application/javascript,text/css,text/html
server.compression.min-response-size=1024
