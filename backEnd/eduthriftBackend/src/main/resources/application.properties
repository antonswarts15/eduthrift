spring.application.name=eduthrift

# Database Configuration
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/eduthrift}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:password}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

spring.flyway.enabled=false

# Server Configuration
server.port=8080

# JWT Configuration
jwt.secret=${JWT_SECRET:eduthrift-super-secret-key-that-is-at-least-256-bits-long-for-security}
jwt.expiration=86400000

app.base.url=${APP_BASE_URL:http://localhost:3000}

# ─── Startup seed data ───────────────────────────────────────────────────────
# ADMIN_INITIAL_PASSWORD and CREATE_TEST_DATA are read directly from env vars
# via @Value in DataInitializer.java — do NOT re-declare them here.
# Re-declaring them with self-referential placeholders causes a circular
# reference error in Spring Framework 6.2+ (Spring Boot 3.3+).

# TradeSafe Configuration (kept for reference — not active)
tradesafe.client.id=${TRADESAFE_CLIENT_ID:}
tradesafe.client.secret=${TRADESAFE_CLIENT_SECRET:}
tradesafe.api.url=${TRADESAFE_API_URL:https://api.tradesafe.co.za}
tradesafe.auth.url=${TRADESAFE_AUTH_URL:https://auth.tradesafe.co.za}
tradesafe.cf.client.id=${TRADESAFE_CF_CLIENT_ID:}
tradesafe.cf.client.secret=${TRADESAFE_CF_CLIENT_SECRET:}

# ─── Payment provider ────────────────────────────────────────────────────────
# TradeSafe is the sole payment and escrow provider.
# Must match Order.PaymentMethod enum constant.
payment.default-provider=TRADESAFE

# Internal API base URL (used for webhook notify URLs sent to payment providers)
api.base.url=${API_BASE_URL:https://api.eduthrift.co.za}

# Pudo Webhook Configuration
# Set this to a long random secret and register the same value in the Pudo developer portal
pudo.webhook.secret=${PUDO_WEBHOOK_SECRET:}

# Courier Guy (formerly ShipLogic) API
shiplogic.api.url=${SHIPLOGIC_API_URL:https://api.portal.thecourierguy.co.za}
shiplogic.webhook.secret=${SHIPLOGIC_WEBHOOK_SECRET:}

# File Upload Configuration
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
file.upload.dir=${FILE_UPLOAD_DIR:/app/uploads}

# Firebase Cloud Messaging (FCM) — service account key JSON, base64-encoded or raw JSON string
firebase.service-account-json=${FIREBASE_SERVICE_ACCOUNT_JSON:}

# Email (SMTP) Configuration — Zoho Mail Pro
spring.mail.host=${MAIL_HOST:smtppro.zoho.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:support@eduthrift.co.za}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000
# Admin email for internal alerts (payout failures, manual payouts)
mail.admin.email=${MAIL_ADMIN_EMAIL:support@eduthrift.co.za}

# Response compression
server.compression.enabled=true
server.compression.mime-types=application/json,application/javascript,text/css,text/html
server.compression.min-response-size=1024
