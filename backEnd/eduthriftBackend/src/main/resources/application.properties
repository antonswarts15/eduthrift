spring.application.name=eduthrift

# Database Configuration
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/eduthrift}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:password}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Server Configuration
server.port=8080

# JWT Configuration
jwt.secret=${JWT_SECRET:eduthrift-super-secret-key-that-is-at-least-256-bits-long-for-security}
jwt.expiration=86400000

app.base.url=${APP_BASE_URL:http://localhost:3000}

# TradeSafe Configuration
tradesafe.client.id=${TRADESAFE_CLIENT_ID:your_client_id_here}
tradesafe.client.secret=${TRADESAFE_CLIENT_SECRET:your_client_secret_here}
# Production: api.tradesafe.co.za / auth.tradesafe.co.za
# Sandbox:    api.tradesafe.dev   / auth.tradesafe.dev
tradesafe.api.url=${TRADESAFE_API_URL:https://api.tradesafe.co.za}
tradesafe.auth.url=${TRADESAFE_AUTH_URL:https://auth.tradesafe.co.za}

# Pudo Webhook Configuration
# Set this to a long random secret and register the same value in the Pudo developer portal
pudo.webhook.secret=${PUDO_WEBHOOK_SECRET:}

# ShipLogic (TCG/CourierGuy) Webhook Configuration
# Set this to a long random secret and register the same value in the ShipLogic developer portal
shiplogic.webhook.secret=${SHIPLOGIC_WEBHOOK_SECRET:}

# File Upload Configuration
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
file.upload.dir=${FILE_UPLOAD_DIR:/app/uploads}

# Firebase Cloud Messaging (FCM) — service account key JSON, base64-encoded or raw JSON string
firebase.service-account-json=${FIREBASE_SERVICE_ACCOUNT_JSON:}

# Response compression
server.compression.enabled=true
server.compression.mime-types=application/json,application/javascript,text/css,text/html
server.compression.min-response-size=1024
