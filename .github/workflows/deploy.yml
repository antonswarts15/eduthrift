name: Deploy to Production

on:
  # Trigger after any of the three build workflows complete on main
  workflow_run:
    workflows:
      - "Build Backend Image"
      - "Build Frontend Image"
      - "Build Admin Image"
    branches:
      - main
    types:
      - completed

jobs:
  deploy:
    # Only deploy if the triggering build actually succeeded
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          # Fail the whole deploy if any command exits non-zero
          script_stop: true
          script: |
            set -euo pipefail
            cd /opt/eduthrift

            echo "=== Pre-deploy backup ==="
            mkdir -p backups
            BACKUP_FILE="backups/db_$(date +%Y%m%d_%H%M%S).sql.gz"

            # Dump the database and compress it in one step
            podman exec eduthrift-mysql \
              sh -c 'mysqldump -uroot -p"$MYSQL_ROOT_PASSWORD" --single-transaction --routines --triggers eduthrift' \
              | gzip > "$BACKUP_FILE"

            echo "Backup saved to $BACKUP_FILE"

            # Keep the 14 most recent backups, delete the rest
            ls -t backups/db_*.sql.gz | tail -n +15 | xargs --no-run-if-empty rm -f

            echo "=== Pulling new images ==="
            podman-compose pull

            echo "=== Restarting containers (volumes are preserved) ==="
            # NEVER use 'down -v' — it destroys mysql_data and backend_uploads
            podman-compose up -d --remove-orphans

            echo "=== Waiting for backend health check ==="
            MAX_ATTEMPTS=30
            ATTEMPT=0
            until curl -sf http://localhost:8080/health > /dev/null 2>&1; do
              ATTEMPT=$((ATTEMPT + 1))
              if [ $ATTEMPT -ge $MAX_ATTEMPTS ]; then
                echo "ERROR: Backend did not become healthy after $MAX_ATTEMPTS attempts."
                echo "Last 50 lines of backend logs:"
                podman logs --tail=50 eduthrift-backend
                exit 1
              fi
              echo "Waiting for backend... attempt $ATTEMPT/$MAX_ATTEMPTS"
              sleep 5
            done

            echo "=== Deploy complete ==="
