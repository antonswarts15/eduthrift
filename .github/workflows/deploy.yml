name: Deploy to Production

on:
  workflow_run:
    workflows:
      - "Build Backend Image"
      - "Build Frontend Image"
      - "Build Admin Image"
    types:
      - completed
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Only deploy if the triggering build succeeded
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e
            cd /opt/eduthrift

            # Pull latest images without destroying volumes
            podman-compose pull

            # Restart containers (named volumes are preserved automatically)
            podman-compose up -d --remove-orphans

            # Confirm containers are running
            podman-compose ps
