version: "3.9"

services:
  mysql:
    image: mysql:8.0
    container_name: eduthrift-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      TZ: Africa/Johannesburg
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backEnd/database/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - eduthrift-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${DB_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 20s
      retries: 10

  backend:
    image: ghcr.io/antonswarts15/eduthrift-backend:latest
    container_name: eduthrift-backend
    ports:
      - "8080:8080"
    restart: always
    environment:
      TZ: Africa/Johannesburg
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/${DB_NAME}
      SPRING_DATASOURCE_USERNAME: ${DB_USER}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      FILE_UPLOAD_DIR: /app/uploads
      APP_BASE_URL: ${APP_BASE_URL:-https://eduthrift.co.za}

      # PUDO
      PUDO_API_KEY: ${PUDO_API_KEY}
      PUDO_API_URL: ${PUDO_API_URL:-https://api.pudo.co.za}
      PUDO_WEBHOOK_SECRET: ${PUDO_WEBHOOK_SECRET}

      # TradeSafe
      TRADESAFE_CLIENT_ID: ${TRADESAFE_CLIENT_ID}
      TRADESAFE_CLIENT_SECRET: ${TRADESAFE_CLIENT_SECRET}
      TRADESAFE_API_URL: ${TRADESAFE_API_URL:-https://api.tradesafe.co.za}
    volumes:
      - backend_uploads:/app/uploads
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - eduthrift-net

  frontend:
    image: ghcr.io/antonswarts15/eduthrift-frontend:latest
    container_name: eduthrift-frontend
    ports:
      - "3000:80"
    restart: always
    networks:
      - eduthrift-net

  admin:
    image: ghcr.io/antonswarts15/eduthrift-admin:latest
    container_name: eduthrift-admin
    ports:
      - "3001:80"
    restart: always
    networks:
      - eduthrift-net

volumes:
  mysql_data:
  backend_uploads:

networks:
  eduthrift-net:
    driver: bridge
