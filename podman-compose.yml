version: "3.9"

services:
  mysql:
    image: mysql:8.0
    container_name: eduthrift-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      TZ: Africa/Johannesburg
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backEnd/database/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - eduthrift-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1"]
      interval: 10s
      timeout: 20s
      retries: 10

  backend:
    image: ghcr.io/antonswarts15/eduthrift-backend:latest
    container_name: eduthrift-backend
    ports:
      - "8080:8080"
    restart: always
    environment:
      TZ: Africa/Johannesburg
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/${DB_NAME}
      SPRING_DATASOURCE_USERNAME: ${DB_USER}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      FILE_UPLOAD_DIR: /app/uploads
      APP_BASE_URL: ${APP_BASE_URL:-https://eduthrift.co.za}

      # TradeSafe — sole payment and escrow provider
      TRADESAFE_CLIENT_ID: ${TRADESAFE_CLIENT_ID}
      TRADESAFE_CLIENT_SECRET: ${TRADESAFE_CLIENT_SECRET}
      TRADESAFE_API_URL: ${TRADESAFE_API_URL:-https://api.tradesafe.co.za}
      TRADESAFE_AUTH_URL: ${TRADESAFE_AUTH_URL:-https://auth.tradesafe.co.za}
      TRADESAFE_CF_CLIENT_ID: ${TRADESAFE_CF_CLIENT_ID:-}
      TRADESAFE_CF_CLIENT_SECRET: ${TRADESAFE_CF_CLIENT_SECRET:-}

      # PUDO
      PUDO_API_KEY: ${PUDO_API_KEY}
      PUDO_API_URL: ${PUDO_API_URL:-https://api.pudo.co.za}
      PUDO_WEBHOOK_SECRET: ${PUDO_WEBHOOK_SECRET}

      # Courier Guy (formerly ShipLogic)
      SHIPLOGIC_API_URL: ${SHIPLOGIC_API_URL:-https://api.portal.thecourierguy.co.za}
      SHIPLOGIC_API_KEY: ${SHIPLOGIC_API_KEY}
      SHIPLOGIC_WEBHOOK_SECRET: ${SHIPLOGIC_WEBHOOK_SECRET:-}

      # Zoho Mail (SMTP)
      MAIL_HOST: ${MAIL_HOST:-smtppro.zoho.com}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME:-support@eduthrift.co.za}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
      MAIL_ADMIN_EMAIL: ${MAIL_ADMIN_EMAIL:-support@eduthrift.co.za}

      # Firebase push notifications
      FIREBASE_SERVICE_ACCOUNT_JSON: ${FIREBASE_SERVICE_ACCOUNT_JSON}

      # Admin seed account
      ADMIN_INITIAL_PASSWORD: ${ADMIN_INITIAL_PASSWORD}
      CREATE_TEST_DATA: ${CREATE_TEST_DATA:-false}

      # Internal API base URL (used in webhook notify URLs)
      API_BASE_URL: ${API_BASE_URL:-https://api.eduthrift.co.za}
    volumes:
      - /home/almalinux/eduthrift-uploads:/app/uploads:z
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - eduthrift-net

  frontend:
    image: ghcr.io/antonswarts15/eduthrift-frontend:latest
    container_name: eduthrift-frontend
    ports:
      - "3000:80"
    restart: always
    networks:
      - eduthrift-net

  admin:
    image: ghcr.io/antonswarts15/eduthrift-admin:latest
    container_name: eduthrift-admin
    ports:
      - "3001:80"
    restart: always
    networks:
      - eduthrift-net

volumes:
  mysql_data:

networks:
  eduthrift-net:
    driver: bridge
